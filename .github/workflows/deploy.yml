name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set image names
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_PREFIX="ghcr.io/${OWNER_LC}/enterprise-flow-hub"
          echo "BACKEND_IMAGE=${IMAGE_PREFIX}-backend:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE=${IMAGE_PREFIX}-frontend:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE_LATEST=${IMAGE_PREFIX}-backend:latest" >> "$GITHUB_ENV"
          echo "FRONTEND_IMAGE_LATEST=${IMAGE_PREFIX}-frontend:latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_LATEST }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ${{ env.FRONTEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE_LATEST }}

      - name: Prepare SSH key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PRIVATE_KEY_B64: ${{ secrets.SSH_PRIVATE_KEY_B64 }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          if [ -n "${SSH_PRIVATE_KEY}" ]; then
            printf '%s\n' "${SSH_PRIVATE_KEY}" | tr -d '\r' > ~/.ssh/deploy_key
          elif [ -n "${SSH_PRIVATE_KEY_B64}" ]; then
            printf '%s' "${SSH_PRIVATE_KEY_B64}" | base64 -d | tr -d '\r' > ~/.ssh/deploy_key
          else
            echo "Either SSH_PRIVATE_KEY or SSH_PRIVATE_KEY_B64 must be set" >&2
            exit 1
          fi
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null

      - name: Verify SSH connection
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=15
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
          )
          # A rebooting instance can accept TCP while sshd is still unavailable.
          # Keep this release queued until it has fully recovered instead of
          # wasting a freshly built image on the first failed handshake.
          for attempt in $(seq 1 40); do
            if ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" "echo ssh-ready"; then
              exit 0
            fi
            if [ "${attempt}" -eq 40 ]; then
              echo "SSH did not recover within 20 minutes" >&2
              exit 1
            fi
            echo "SSH unavailable (attempt ${attempt}/40); retrying in 15 seconds..."
            sleep 15
          done

      - name: Transfer images to server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
          )
          docker pull "${BACKEND_IMAGE}" &
          BACKEND_PULL_PID=$!
          docker pull "${FRONTEND_IMAGE}" &
          FRONTEND_PULL_PID=$!
          wait "${BACKEND_PULL_PID}"
          wait "${FRONTEND_PULL_PID}"
          # Keep the current release online while importing the next images.
          # On the 1.6GB production host, aggressive all-image/builder pruning
          # can saturate disk I/O and make the whole instance unresponsive.
          ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" \
            "docker container prune -f >/dev/null && docker image prune -f >/dev/null"
          docker save "${BACKEND_IMAGE}" "${FRONTEND_IMAGE}" \
            | gzip -1 \
            | ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" "nice -n 19 ionice -c3 gzip -d | nice -n 19 ionice -c3 docker load"

      - name: Upload deployment files
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
          )
          SSH_TARGET="${SSH_USER}@${SSH_HOST}"
          ssh "${SSH_OPTS[@]}" "${SSH_TARGET}" "sudo mkdir -p /opt/enterprise-flow-hub && sudo chown ${SSH_USER}:${SSH_USER} /opt/enterprise-flow-hub"
          tar -C deploy -czf - docker-compose.yml nginx.conf backup-db.sh cleanup-docker-images.sh \
            | ssh "${SSH_OPTS[@]}" "${SSH_TARGET}" "tar -xzf - -C /opt/enterprise-flow-hub/"

      - name: Deploy on server
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_ACCESS_TOKEN: ${{ secrets.FEISHU_USER_ACCESS_TOKEN }}
          FEISHU_VERIFICATION_TOKEN: ${{ secrets.FEISHU_VERIFICATION_TOKEN }}
          FEISHU_ENCRYPT_KEY: ${{ secrets.FEISHU_ENCRYPT_KEY }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          set -euo pipefail
          SSH_OPTS=(
            -i "$HOME/.ssh/deploy_key"
            -o IdentitiesOnly=yes
            -o BatchMode=yes
            -o StrictHostKeyChecking=accept-new
            -o ConnectTimeout=20
            -o ServerAliveInterval=15
            -o ServerAliveCountMax=3
          )
          ssh "${SSH_OPTS[@]}" "${SSH_USER}@${SSH_HOST}" \
            BACKEND_IMAGE="${BACKEND_IMAGE}" \
            FRONTEND_IMAGE="${FRONTEND_IMAGE}" \
            DEEPSEEK_API_KEY="${DEEPSEEK_API_KEY}" \
            FEISHU_APP_ID="${FEISHU_APP_ID}" \
            FEISHU_APP_SECRET="${FEISHU_APP_SECRET}" \
            FEISHU_USER_ACCESS_TOKEN="${FEISHU_USER_ACCESS_TOKEN}" \
            FEISHU_VERIFICATION_TOKEN="${FEISHU_VERIFICATION_TOKEN}" \
            FEISHU_ENCRYPT_KEY="${FEISHU_ENCRYPT_KEY}" \
            DEPLOY_HOST="${SSH_HOST}" \
            'bash -s' <<'EOF'
          set -euo pipefail
          cd /opt/enterprise-flow-hub
          AVAILABLE_MEM_KB="$(awk '/MemAvailable/ {print $2}' /proc/meminfo)"
          if [ "${AVAILABLE_MEM_KB:-0}" -lt 262144 ]; then
            echo "Refusing deployment: less than 256MB memory is available before replacement." >&2
            free -h >&2
            exit 1
          fi
          chmod +x /opt/enterprise-flow-hub/backup-db.sh
          chmod +x /opt/enterprise-flow-hub/cleanup-docker-images.sh

          cat > .env <<ENVEOF
          BACKEND_IMAGE=${BACKEND_IMAGE}
          FRONTEND_IMAGE=${FRONTEND_IMAGE}
          CORS_ORIGIN=http://${DEPLOY_HOST}
          DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
          DEEPSEEK_BASE_URL=https://api.deepseek.com
          DEEPSEEK_MODEL=deepseek-chat
          AGENT_RUNTIME=claude-code
          AGENT_FALLBACK_RUNTIME=legacy
          FEISHU_APP_ID=${FEISHU_APP_ID}
          FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
          FEISHU_USER_ACCESS_TOKEN=${FEISHU_USER_ACCESS_TOKEN}
          FEISHU_DOMAIN=https://open.feishu.cn
          FEISHU_VERIFICATION_TOKEN=${FEISHU_VERIFICATION_TOKEN}
          FEISHU_ENCRYPT_KEY=${FEISHU_ENCRYPT_KEY}
          ENVEOF

          docker image inspect "${BACKEND_IMAGE}" >/dev/null
          docker image inspect "${FRONTEND_IMAGE}" >/dev/null

          # Let Compose replace only changed containers. Keeping the previous
          # images until the replacement is healthy avoids a host-wide stop and
          # gives Docker a chance to reuse existing layers.
          docker compose up -d --remove-orphans

          # Remove only dangling layers. Full pruning runs weekly, outside the
          # deployment window, via cleanup-docker-images.sh.
          docker image prune -f

          sudo cp /opt/enterprise-flow-hub/nginx.conf /etc/nginx/sites-available/enterprise-flow-hub
          sudo ln -sf /etc/nginx/sites-available/enterprise-flow-hub /etc/nginx/sites-enabled/enterprise-flow-hub
          sudo rm -f /etc/nginx/sites-enabled/poke-card-emulator
          sudo nginx -t
          sudo systemctl reload nginx

          mkdir -p /opt/enterprise-flow-hub/backups
          AVAILABLE_KB="$(df -Pk /tmp | awk 'NR==2 {print $4}')"
          if [ "${AVAILABLE_KB:-0}" -gt 1024 ]; then
            (
              crontab -l 2>/dev/null || true
            ) | grep -v -e "/opt/enterprise-flow-hub/backup-db.sh" -e "/opt/enterprise-flow-hub/cleanup-docker-images.sh" > /tmp/enterprise-flow-hub-cron || true
            {
              cat /tmp/enterprise-flow-hub-cron
              echo "20 3 * * * /opt/enterprise-flow-hub/backup-db.sh >> /opt/enterprise-flow-hub/backups/backup.log 2>&1"
              echo "10 4 * * 0 /opt/enterprise-flow-hub/cleanup-docker-images.sh --all >> /opt/enterprise-flow-hub/backups/docker-cleanup.log 2>&1"
            } | crontab -
            rm -f /tmp/enterprise-flow-hub-cron
          else
            echo "Skipping crontab update because /tmp has less than 1MB free. Disk usage:"
            df -h
          fi
          docker compose ps

          # Health check: container "running" can precede the Node listener by a few seconds.
          echo "::group::Health check"
          for i in $(seq 1 30); do
            STATUS=$(docker compose ps --services --status running 2>/dev/null | wc -l | tr -d ' ')
            if [ "${STATUS}" -ge 2 ] && HEALTH_PAYLOAD="$(curl -fsS http://127.0.0.1:4000/health 2>/dev/null)"; then
              echo "All services healthy after ${i}s"
              break
            fi
            if [ "${i}" -eq 30 ]; then
              echo "Backend health check timed out"
              docker compose logs --tail=100 backend
              exit 1
            fi
            sleep 1
          done
          docker compose ps
          printf '%s\n' "${HEALTH_PAYLOAD}"
          printf '%s' "${HEALTH_PAYLOAD}" | grep -q '"activeRuntime":"claude-code"' && echo "Backend and Claude Code runtime OK"
          echo "::endgroup::"
          EOF
