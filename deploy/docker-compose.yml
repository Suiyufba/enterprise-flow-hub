services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DB_PATH: /data/efh.db
      UPLOAD_DIR: /data/uploads
      TZ: ${TZ:-Asia/Shanghai}
      AUTOMATION_TIMEZONE: ${AUTOMATION_TIMEZONE:-Asia/Shanghai}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://101.200.45.180}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      AGENT_RUNTIME: ${AGENT_RUNTIME:-claude-code}
      AGENT_FALLBACK_RUNTIME: ${AGENT_FALLBACK_RUNTIME:-legacy}
      CLAUDE_CODE_WORKDIR: /data/claude-workdir
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_USER_ACCESS_TOKEN: ${FEISHU_USER_ACCESS_TOKEN:-}
      FEISHU_DOMAIN: ${FEISHU_DOMAIN:-https://open.feishu.cn}
      FEISHU_VERIFICATION_TOKEN: ${FEISHU_VERIFICATION_TOKEN:-}
      FEISHU_ENCRYPT_KEY: ${FEISHU_ENCRYPT_KEY:-}
    volumes:
      - backend-data:/data
    ports:
      - "127.0.0.1:4000:4000"
    mem_limit: 750m
    mem_reservation: 350m
    cpus: "0.75"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:4000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    mem_limit: 350m
    mem_reservation: 150m
    cpus: "0.35"
    depends_on:
      - backend

volumes:
  backend-data:
