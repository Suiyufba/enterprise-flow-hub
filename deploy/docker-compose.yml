services:
  backend:
    image: ${BACKEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 4000
      DB_PATH: /data/efh.db
      TZ: ${TZ:-Asia/Shanghai}
      AUTOMATION_TIMEZONE: ${AUTOMATION_TIMEZONE:-Asia/Shanghai}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://43.167.202.152}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      AGENT_RUNTIME: ${AGENT_RUNTIME:-legacy}
      AGENT_FALLBACK_RUNTIME: ${AGENT_FALLBACK_RUNTIME:-legacy}
      HERMES_API_URL: ${HERMES_API_URL:-http://hermes-agent:8642}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      HERMES_MODEL: ${HERMES_MODEL:-hermes-agent}
      HERMES_ENABLED_USER_IDS: ${HERMES_ENABLED_USER_IDS:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-}
    volumes:
      - backend-data:/data
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    image: ${FRONTEND_IMAGE}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend

  hermes-agent:
    image: ${HERMES_IMAGE:-nousresearch/hermes-agent:latest}
    restart: unless-stopped
    command: ["gateway", "run"]
    environment:
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      API_SERVER_KEY: ${HERMES_API_KEY}
      HERMES_DATA_DIR: /opt/data
      HERMES_INFERENCE_PROVIDER: ${HERMES_INFERENCE_PROVIDER:-deepseek}
      HERMES_MODEL: ${HERMES_INFERENCE_MODEL:-deepseek-chat}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
    volumes:
      - hermes-data:/opt/data
    ports:
      - "127.0.0.1:8642:8642"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8642/health >/dev/null"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  backend-data:
  hermes-data:
